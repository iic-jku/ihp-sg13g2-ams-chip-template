project:
  type: website
  output-dir: _site

var:
  url-repo: https://github.com/iic-jku/ihp-sg13g2-ams-chip-template

website:
  title: "Open-Source Analog-Mixed Signal Chip Design Tutorial"
  favicon: fig/favicon.png
  site-url: "https://iic-jku.github.io/ihp-sg13g2-ams-chip-template/"
  repo-url: "https://github.com/iic-jku/ihp-sg13g2-ams-chip-template"
  repo-subdir: tutorial
  repo-branch: main
  repo-actions: [edit, issue]
  navbar:
    background: "#447099"
    search: true
    left:
      - icon: house
        href: index.qmd
        text: "Home"
      - icon: bi-filetype-pdf
        text: PDF
        href: index.pdf
    right:
      - icon: github
        href: "https://github.com/iic-jku/ihp-sg13g2-ams-chip-template"
        target: "_blank"
  page-footer:
    left: |
      [Source code]({{< meta var.url-repo >}}){.external target="_blank"}
    right: |
      Website built with [Quarto](https://quarto.org/){.external target="_blank"}

execute:
  freeze: auto

format:
  html:
    toc: true
    toc-depth: 3
    number-sections: true
    theme:
      light: cosmo
      dark: solar
    fig-align: center
    lang: en-US
    lightbox: true
    include-after-body:
      text: |
        <script>
        document.addEventListener('DOMContentLoaded', function() {
          document.querySelectorAll('a').forEach(function(a) {
            var t = (a.textContent || '').trim();
            if (t === 'Edit this page') {
              a.href = 'https://github.com/iic-jku/ihp-sg13g2-ams-chip-template/pulls';
            } else if (t === 'Report an issue') {
              a.href = 'https://github.com/iic-jku/ihp-sg13g2-ams-chip-template/issues';
            }
          });
        });
        </script>