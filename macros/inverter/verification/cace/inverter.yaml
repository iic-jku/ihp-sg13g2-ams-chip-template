#--------------------------------------------------------------
# CACE circuit characterization file
#--------------------------------------------------------------

name:           inverter
description:    Inverter macro for the ihp-sg13g2 chip template
PDK:            ihp-sg13g2

cace_format:    5.2

authorship:
  designer:         Simon Dorrer
  company:          Johannes Kepler University
  creation_date:    May 6, 2026
  license:          Apache-2.0 WITH SHL-2.1

paths:
  root:             ..
  schematic:        ../schematic/xschem
  netlist:          cace/netlist
  documentation:    cace/_docs
  runs:             cace/_runs

pins:
  VDD:
    description: Positive analog power supply
    type: power
    direction: inout
    Vmin: 1.4
    Vmax: 1.6
  VSS:
    description: Analog ground
    type: ground
    direction: inout
  vin:
    description: Inverter input
    type: signal
    direction: input
  vout:
    description: Inverter output
    type: signal
    direction: output

default_conditions:
  vdd:
    description: Analog power supply voltage
    display: VDD
    unit: V
    typical: 1.5
  vcm:
    description: Input common-mode voltage
    display: Vcm
    unit: V
    typical: 0.75
  corner_mos:
    description: Process corner MOSFET
    display: Corner MOSFET
    typical: tt
  corner_r:
    description: Process corner resistor
    display: Corner R
    typical: typ
  corner_c:
    description: Process corner capacitor
    display: Corner C
    typical: typ
  temp:
    description: Ambient temperature
    display: Temperature
    unit: °C
    typical: 27
  cload:
    description: Load capacitance
    display: Cload
    unit: pF
    typical: 10

parameters:
  ac_params:
    spec:
      Adc_ol_dB:
        display: Open-loop dc gain
        description: Small-signal open-loop gain at 10Hz
        unit: dB
        minimum:
          value: 5
        typical:
          value: any
        maximum:
          value: any
      fcu:
        display: Upper -3dB cut-off frequency
        description: Upper -3dB cut-off frequency
        unit: Hz
        minimum:
          value: 1000000
        typical:
          value: any
        maximum:
          value: any
    tool:
      ngspice:
        template: inverter_tb_ac.sch
        format: ascii
        suffix: .data
        variables: [Adc_ol_dB, fcu]
    plot:
      Adc_ol_dB_vs_vdd:
        type: xyplot
        xaxis: vdd
        yaxis: Adc_ol_dB
        limits: auto
      Adc_ol_dB_vs_vcm:
        type: xyplot
        xaxis: vcm
        yaxis: Adc_ol_dB
        limits: auto
      Adc_ol_dB_vs_corner_mos:
        type: xyplot
        xaxis: corner_mos
        yaxis: Adc_ol_dB
        limits: auto
      Adc_ol_dB_vs_temp:
        type: xyplot
        xaxis: temp
        yaxis: Adc_ol_dB
        limits: auto
      Adc_ol_dB_vs_cload:
        type: xyplot
        xaxis: cload
        yaxis: Adc_ol_dB
        limits: auto
      fcu_vs_vdd:
        type: xyplot
        xaxis: vdd
        yaxis: fcu
        limits: auto
      fcu_vs_vcm:
        type: xyplot
        xaxis: vcm
        yaxis: fcu
        limits: auto
      fcu_vs_corner_mos:
        type: xyplot
        xaxis: corner_mos
        yaxis: fcu
        limits: auto
      fcu_vs_temp:
        type: xyplot
        xaxis: temp
        yaxis: fcu
        limits: auto
      fcu_vs_cload:
        type: xyplot
        xaxis: cload
        yaxis: fcu
        limits: auto
    conditions:
      vdd:
        # minimum: 1.2
        typical: 1.5
        # maximum: 1.8
      vcm:
        # minimum: 0.60
        typical: 0.75
        # maximum: 0.90
      corner_mos:
        enumerate: [ss, sf, tt, fs, ff]
        # typical: tt
      corner_r:
        typical: typ
      corner_c:
        typical: typ
      temp:
        #minimum: 0
        typical: 27
        #maximum: 70
      cload:
        #minimum: 1       # 1pF
        typical: 10       # 10pF
        #maximum: 50      # 50pF
  
  ac_mc_params:
    spec:
      Adc_ol_dB:
        display: Open-loop dc gain - Monte Carlo
        description: Small-signal open-loop gain at 10Hz
        unit: dB
        minimum:
          value: 5
        typical:
          value: any
        maximum:
          value: any
      fcu:
        display: Upper -3dB cut-off frequency - Monte Carlo
        description: Upper -3dB cut-off frequency
        unit: Hz
        minimum:
          value: 1000000
        typical:
          value: any
        maximum:
          value: any
    tool:
      ngspice:
        template: inverter_tb_ac.sch
        collate: iterations
        format: ascii
        suffix: .data
        variables: [Adc_ol_dB, fcu]
        script: inverter_tb_ac.py
        script_variables: [Adc_ol_dB_arr, fcu_arr]
    plot:
      Adc_ol_dB_mc:
        type: histogram
        xaxis: Adc_ol_dB_arr
      fcu_mc:
        type: histogram
        xaxis: fcu_arr
    conditions:
      vdd:
        #minimum: 1.4
        typical: 1.5
        #maximum: 1.6
      vcm:
        #minimum: 0.60
        typical: 0.75
        #maximum: 0.90
      iterations: # for Monte Carlo
        description: Iterations to run
        display: Iterations
        minimum: 1
        maximum: 200
        step: linear
        stepsize: 1
      corner_mos:
        typical: tt_stat    # Process variation Monte Carlo
      corner_r:
        typical: stat
      corner_c:
        typical: typ_stat
      temp:
        #minimum: 0
        typical: 27
        #maximum: 70
      cload:
        #minimum: 1       # 1pF
        typical: 10       # 10pF
        #maximum: 50      # 50pF
        
  ac_mm_params:
    spec:
      Adc_ol_dB:
        display: Open-loop dc gain - Mismatch
        description: Small-signal open-loop gain at 10Hz
        unit: dB
        minimum:
          value: 5
        typical:
          value: any
        maximum:
          value: any
      fcu:
        display: Upper -3dB cut-off frequency - Mismatch
        description: Upper -3dB cut-off frequency
        unit: Hz
        minimum:
          value: 1000000
        typical:
          value: any
        maximum:
          value: any
    tool:
      ngspice:
        template: inverter_tb_ac.sch
        collate: iterations
        format: ascii
        suffix: .data
        variables: [Adc_ol_dB, fcu]
        script: inverter_tb_ac.py
        script_variables: [Adc_ol_dB_arr, fcu_arr]
    plot:
      Adc_ol_dB_mm:
        type: histogram
        xaxis: Adc_ol_dB_arr
      fcu_mm:
        type: histogram
        xaxis: fcu_arr
    conditions:
      vdd:
        #minimum: 1.4
        typical: 1.5
        #maximum: 1.6
      vcm:
        #minimum: 0.60
        typical: 0.75
        #maximum: 0.90
      iterations: # for Mismatch
        description: Iterations to run
        display: Iterations
        minimum: 1
        maximum: 200
        step: linear
        stepsize: 1
      corner_mos:
        typical: tt_mismatch
        # typical: ss_mismatch
        # typical: ff_mismatch
        # typical: sf_mismatch
      corner_r:
        typical: typ_mismatch
      corner_c:
        typical: typ_mismatch
      temp:
        #minimum: 0
        typical: 27
        #maximum: 70
      cload:
        #minimum: 1       # 1pF
        typical: 10       # 10pF
        #maximum: 50      # 50pF