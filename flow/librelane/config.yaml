meta:
  version: 3
  flow: Chip
  substituting_steps:

    # Magic reports some overlaps which can be ignored
    Checker.IllegalOverlap: null

    # Disable KLayout DRC
    #KLayout.DRC: null
    #Checker.KLayoutDRC: null

    # Disable Magic DRC
    #Magic.DRC: null
    #Checker.MagicDRC: null

    # Disable KLayout antenna check
    #KLayout.Antenna: null
    #Checker.KLayoutAntenna: null

    # Disable KLayout density check
    #KLayout.Density: null
    #Checker.KLayoutDensity: null

    # Save time
    #OpenROAD.IRDropReport: null
    #KLayout.XOR: null
    #Netgen.LVS: null
    #Checker.LVS: null

    # Use Magic.Filler instead of KLayout.Filler
    # This can help in some cases where the target
    # density cannot be met using KLayout.
    #KLayout.Filler: Magic.Filler

    # Disable KLayout filler (all layers)
    # TODO: add custom LibreLane step for filler insertion after ArtistIC added logo.
    KLayout.Filler: null

    # TODO: Add GDSFill

    # Disable setup-violation errors
    #Checker.SetupViolations: null

    # Fix hold violations by inserting buffers
    #"+OpenROAD.DetailedRouting": "Odb.InsertECOBuffers"
    #"+Odb.InsertECOBuffers": "OpenROAD.DetailedRouting"


# INSERT_ECO_BUFFERS:
#  - target: rst_n_pad/Y
#    buffer: sg13g2_buf_4

DESIGN_NAME: chip_top
VERILOG_FILES:
- dir::../../rtl/chip_top.sv
- dir::../../rtl/chip_core.sv

VERILOG_DEFINES: [FUNCTIONAL]

# Enable plugin for better SystemVerilog support
# USE_SLANG: True
# SLANG_ARGUMENTS: ['--keep-hierarchy']

# Slightly smaller file sizes
PRIMARY_GDSII_STREAMOUT_TOOL: klayout

# ================================================================
# Padframe layout — 8 pads per side, 32 user bondpads in total.
# Order convention:
#   - PAD_WEST  : bottom to top
#   - PAD_EAST  : bottom to top
#   - PAD_NORTH : left   to right
#   - PAD_SOUTH : left   to right
# Pad-cell instance names follow the generate-block hierarchy in
# rtl/chip_top.sv (e.g. "g_outputs[16].output_pad"). 
# See doc/pinout.md for the full pin table.
# ================================================================

# West (bottom to top): SRAM_out, GND, VDD, IOGND, IOVDD, enable, rst_n, clk
PAD_WEST: [
    "g_outputs\\[16\\].output_pad",     # output_PAD[16] = sram_0_out
    "g_vss_pads\\[0\\].vss_pad",        # VSS  (core ground)
    "g_vdd_pads\\[0\\].vdd_pad",        # VDD  (1.5 V core supply)
    "g_iovss_pads\\[0\\].iovss_pad",    # IOVSS (3.3 V I/O ground)
    "g_iovdd_pads\\[0\\].iovdd_pad",    # IOVDD (3.3 V I/O supply)
    "g_inputs\\[0\\].input_pad",        # input_PAD[0]   = enable
    rst_n_pad,                          # rst_n
    clk_pad                             # clk
]

# North (left to right): counter1_value[3:0], counter1_value[7:4] / inv1.vin bidir
PAD_NORTH: [
    "g_outputs\\[0\\].output_pad",      # output_PAD[0]  = counter1_value[0] (LSB)
    "g_outputs\\[1\\].output_pad",      # output_PAD[1]  = counter1_value[1]
    "g_outputs\\[2\\].output_pad",      # output_PAD[2]  = counter1_value[2]
    "g_outputs\\[3\\].output_pad",      # output_PAD[3]  = counter1_value[3]
    "g_bidirs\\[0\\].bidir_pad",        # bidir_PAD[0]   = counter1_value[4] / inv1_din1
    "g_bidirs\\[1\\].bidir_pad",        # bidir_PAD[1]   = counter1_value[5] / inv1_din2
    "g_bidirs\\[2\\].bidir_pad",        # bidir_PAD[2]   = counter1_value[6] / inv1_din3
    "g_bidirs\\[3\\].bidir_pad"         # bidir_PAD[3]   = counter1_value[7] / inv1_din4
]

# South (left to right): counter2_value[7:0]
PAD_SOUTH: [
    "g_outputs\\[4\\].output_pad",      # output_PAD[4]  = counter2_value[0] (LSB)
    "g_outputs\\[5\\].output_pad",      # output_PAD[5]  = counter2_value[1]
    "g_outputs\\[6\\].output_pad",      # output_PAD[6]  = counter2_value[2]
    "g_outputs\\[7\\].output_pad",      # output_PAD[7]  = counter2_value[3]
    "g_outputs\\[8\\].output_pad",      # output_PAD[8]  = counter2_value[4]
    "g_outputs\\[9\\].output_pad",      # output_PAD[9]  = counter2_value[5]
    "g_outputs\\[10\\].output_pad",     # output_PAD[10] = counter2_value[6]
    "g_outputs\\[11\\].output_pad"      # output_PAD[11] = counter2_value[7]
]

# East (bottom to top): inverter2 analog ch1/ch2 (4 pads), inverter1 digital out (4 pads)
PAD_EAST: [
    "g_analogs\\[0\\].analog_pad",      # analog_PAD[0]  = inv2_vin1  (via padres)
    "g_analogs\\[1\\].analog_pad",      # analog_PAD[1]  = inv2_vin2  (via padres)
    "g_analogs\\[2\\].analog_pad",      # analog_PAD[2]  = inv2_vout1 (via padbare)
    "g_analogs\\[3\\].analog_pad",      # analog_PAD[3]  = inv2_vout2 (via padbare)
    "g_outputs\\[12\\].output_pad",     # output_PAD[12] = inv1_dout1
    "g_outputs\\[13\\].output_pad",     # output_PAD[13] = inv1_dout2
    "g_outputs\\[14\\].output_pad",     # output_PAD[14] = inv1_dout3
    "g_outputs\\[15\\].output_pad"      # output_PAD[15] = inv1_dout4
]

# SDC files
PNR_SDC_FILE:     dir::chip_top.sdc
SIGNOFF_SDC_FILE: dir::chip_top.sdc
FALLBACK_SDC:     dir::chip_top.sdc

# Power / ground nets
VDD_NETS: ["VDD"]
GND_NETS: ["VSS"]
VERILOG_POWER_DEFINE: "USE_POWER_PINS"

# Clock
CLOCK_PORT: clk_PAD
CLOCK_NET:  clk_pad/p2c

CLOCK_PERIOD: 20 # in ns == 50 MHz

# Floorplanning
FP_SIZING: absolute
DIE_AREA:  [0, 0, 1600, 1600]
CORE_AREA: [365, 365, 1235, 1235]

# Increase for more logic on your die
PL_TARGET_DENSITY_PCT: 10
GRT_ALLOW_CONGESTION:  true

# Bondpads
# Override bondpad name
PAD_BONDPAD_NAME: sg13g2_ip__bondpad_70x70

EXTRA_GDS:
- dir::../../ip/sg13g2_ip__bondpad_70x70/final/gds/sg13g2_ip__bondpad_70x70.gds

EXTRA_LEFS:
- dir::../../ip/sg13g2_ip__bondpad_70x70/final/lef/sg13g2_ip__bondpad_70x70.lef

IGNORE_DISCONNECTED_MODULES:
- sg13g2_ip__bondpad_70x70
- sg13g2_ip__jku
- sg13g2_ip__jku_names

# PDN
PDN_CORE_RING: True

# Maximum metal width without slotting: 30um
PDN_CORE_RING_VWIDTH: 15
PDN_CORE_RING_HWIDTH: 15
# Ensure minimum spacing for long metals
PDN_CORE_RING_VSPACING: 5
PDN_CORE_RING_HSPACING: 5

PDN_CORE_RING_CONNECT_TO_PADS: True
PDN_ENABLE_PINS: False

# Because we have multiple power pads for one power domain
MAGIC_EXT_UNIQUE: notopports

# Custom PDN config
PDN_CFG: dir::pdn_cfg.tcl

# SRAM power-net hookup. The SRAM has a secondary VDDARRAY!/VSS! domain in addition 
# to the standard VDD!/VSS! pair, so two PDN_MACRO_CONNECTIONS lines are required per instance.
# This is an alternative method compared to specifying the power connections in the RTL
PDN_MACRO_CONNECTIONS:
- "i_chip_core.sram_0 VDD VSS VDDARRAY! VSS!"
- "i_chip_core.sram_0 VDD VSS VDD! VSS!"

# Custom pad files for PADBARE
PAD_LEFS:           dir::../../ip/sg13g2_io_custom/lef/sg13g2_io.lef
PAD_VERILOG_MODELS: dir::../../ip/sg13g2_io_custom/verilog/sg13g2_io.v

# Technology LIBs
LIB:
  "*_fast_1p32V_m40C":
    - pdk_dir::libs.ref/sg13g2_stdcell/lib/sg13g2_stdcell_fast_1p32V_m40C.lib
    - dir::../../ip/sg13g2_io_custom/lib/sg13g2_io_fast_1p32V_3p6V_m40C.lib

  "*_fast_1p65V_m40C":
    - pdk_dir::libs.ref/sg13g2_stdcell/lib/sg13g2_stdcell_fast_1p65V_m40C.lib
    - dir::../../ip/sg13g2_io_custom/lib/sg13g2_io_fast_1p65V_3p6V_m40C.lib

  "*_slow_1p08V_125C":
    - pdk_dir::libs.ref/sg13g2_stdcell/lib/sg13g2_stdcell_slow_1p08V_125C.lib
    - dir::../../ip/sg13g2_io_custom/lib/sg13g2_io_slow_1p08V_3p0V_125C.lib

  "*_slow_1p35V_125C":
    - pdk_dir::libs.ref/sg13g2_stdcell/lib/sg13g2_stdcell_slow_1p35V_125C.lib
    - dir::../../ip/sg13g2_io_custom/lib/sg13g2_io_slow_1p35V_3p0V_125C.lib

  "*_typ_1p20V_25C":
    - pdk_dir::libs.ref/sg13g2_stdcell/lib/sg13g2_stdcell_typ_1p20V_25C.lib
    - dir::../../ip/sg13g2_io_custom/lib/sg13g2_io_typ_1p2V_3p3V_25C.lib

  "*_typ_1p50V_25C":
    - pdk_dir::libs.ref/sg13g2_stdcell/lib/sg13g2_stdcell_typ_1p50V_25C.lib
    - dir::../../ip/sg13g2_io_custom/lib/sg13g2_io_typ_1p5V_3p3V_25C.lib

# Corners
STA_CORNERS:
  - nom_fast_1p32V_m40C
  - nom_fast_1p65V_m40C
  - nom_slow_1p08V_125C
  - nom_slow_1p35V_125C
  - nom_typ_1p20V_25C
  - nom_typ_1p50V_25C

DEFAULT_CORNER: nom_typ_1p50V_25C

# Limit detailed routing to 10 iterations
# DRT_OPT_ITERS: 10

# Non-Default Rules (NDRs) for the following analog traces
# Note for the AUTO_TAPER_NDR_NETS variable:
# OpenROAD needs to be recompiled with the following patch when the AUTO_TAPER_NDR_NETS variable is changed from true (default) to false:
# https://github.com/FPGA-Research/heichips25-tapeout/blob/main/nix/disable_auto_taper.patch
# The AUTO_TAPER_NDR_NETS variable tells the detailed router whether it is allowed to automatically "shrink" those wide NDR wires to fit onto small pins.
# When Enabled (1 or true - Default): The router will automatically taper the wide wire down to the minimum width of the pin's metal layer as it makes the final connection.
# When Disabled (0 or false): The router will attempt to maintain the full NDR width all the way into the pin.
# Pending issue to change AUTO_TAPER_NDR_NETS in the LibreLane `config.yaml`: https://github.com/The-OpenROAD-Project/OpenROAD/issues/10032
NON_DEFAULT_RULES:
  # Rules for analog traces (inverter2 vin/vout pairs).
  # 1.35 um width and 0.5 um spacing on Metal1 through TopMetal2.
  NDR_analog:
    width:   ["1.35"]
    spacing: ["0.5"]
    via:     ["Via1_DC1B", "Via2_DC1B", "Via3_DC1B", "Via4_DC1B", "TopVia1EWNS", "TopVia2EWNS"]

# Apply NDRs to analog traces during detailed routing
DRT_ASSIGN_NDR:
  "^.*PADRES.*$":  NDR_analog
  "^.*PADBARE.*$": NDR_analog

# Do not touch analog traces --> no optimization or buffering
RSZ_DONT_TOUCH_LIST:
- "analog_PADRES[0]"
- "analog_PADRES[1]"
- "analog_PADBARE[2]"
- "analog_PADBARE[3]"

MACROS:
  # ----------------------------------------------------------------
  # 2 x counter_top
  # ----------------------------------------------------------------
  counter_top:
    gds:
      - dir::../../macros/counter/final/gds/counter_top.gds
    lef:
      - dir::../../macros/counter/final/lef/counter_top.lef
    pnl:
      - dir::../../macros/counter/final/pnl/counter_top.pnl.v
    nl:
      - dir::../../macros/counter/final/nl/counter_top.nl.v
    spef:
      nom_*: dir::../../macros/counter/final/spef/nom/counter_top.nom.spef
    lib:
      nom_fast_1p32V_m40C: dir::../../macros/counter/final/lib/nom_fast_1p32V_m40C/counter_top__nom_fast_1p32V_m40C.lib
      nom_fast_1p65V_m40C: dir::../../macros/counter/final/lib/nom_fast_1p65V_m40C/counter_top__nom_fast_1p65V_m40C.lib
      nom_slow_1p08V_125C: dir::../../macros/counter/final/lib/nom_slow_1p08V_125C/counter_top__nom_slow_1p08V_125C.lib
      nom_slow_1p35V_125C: dir::../../macros/counter/final/lib/nom_slow_1p35V_125C/counter_top__nom_slow_1p35V_125C.lib
      nom_typ_1p20V_25C:   dir::../../macros/counter/final/lib/nom_typ_1p20V_25C/counter_top__nom_typ_1p20V_25C.lib
      nom_typ_1p50V_25C:   dir::../../macros/counter/final/lib/nom_typ_1p50V_25C/counter_top__nom_typ_1p50V_25C.lib
    instances:
      # counter1 — upper west position (drives output_PAD[3:0] / bidir_PAD[3:0])
      i_chip_core.counter1:
        location: ["expr::365 + 70 + 500", "expr::365 + 130 + 500"]
        orientation: N
      # counter2 — lower west position (drives output_PAD[11:4] = south pads)
      i_chip_core.counter2:
        location: ["expr::365 + 70 + 500", "expr::365 + 130"]
        orientation: FS

  # ----------------------------------------------------------------
  # 1 x RM_IHPSG13_1P_1024x32_c2_bm_bist
  # ----------------------------------------------------------------
  RM_IHPSG13_1P_1024x32_c2_bm_bist:
    gds:
      - pdk_dir::libs.ref/sg13g2_sram/gds/RM_IHPSG13_1P_1024x32_c2_bm_bist.gds
    lef:
      - pdk_dir::libs.ref/sg13g2_sram/lef/RM_IHPSG13_1P_1024x32_c2_bm_bist.lef
    vh:
      - pdk_dir::libs.ref/sg13g2_sram/verilog/RM_IHPSG13_1P_1024x32_c2_bm_bist.v
      - pdk_dir::libs.ref/sg13g2_sram/verilog/RM_IHPSG13_1P_core_behavioral_bm_bist.v
    lib:
      # The IHP SRAM macros are not specified for all corners, especially for >1.32V,
      # so we use the same corner's lib "RM_IHPSG13_1P_1024x32_c2_bm_bist_fast_1p32V_m55C" 
      # for multiple corners. This is not ideal but it allows us to proceed with the tapeout 
      # without waiting for IHP to characterize more corners.
      "*_fast_1p32V_m40C":
        - pdk_dir::libs.ref/sg13g2_sram/lib/RM_IHPSG13_1P_1024x32_c2_bm_bist_fast_1p32V_m55C.lib
      "*_fast_1p65V_m40C":
        - pdk_dir::libs.ref/sg13g2_sram/lib/RM_IHPSG13_1P_1024x32_c2_bm_bist_fast_1p32V_m55C.lib
      "*_slow_1p08V_125C":
        - pdk_dir::libs.ref/sg13g2_sram/lib/RM_IHPSG13_1P_1024x32_c2_bm_bist_slow_1p08V_125C.lib
      "*_slow_1p35V_125C":
        - pdk_dir::libs.ref/sg13g2_sram/lib/RM_IHPSG13_1P_1024x32_c2_bm_bist_fast_1p32V_m55C.lib
      "*_typ_1p20V_25C":
        - pdk_dir::libs.ref/sg13g2_sram/lib/RM_IHPSG13_1P_1024x32_c2_bm_bist_typ_1p20V_25C.lib
      "*_typ_1p50V_25C":
        - pdk_dir::libs.ref/sg13g2_sram/lib/RM_IHPSG13_1P_1024x32_c2_bm_bist_fast_1p32V_m55C.lib
    instances:
      i_chip_core.sram_0:
        location: ["expr::365 + 70", "expr::365 + 130"]
        orientation: N

  # ----------------------------------------------------------------
  # 2 x inverter_top
  # ----------------------------------------------------------------
  inverter_top:
    gds:
      - dir::../../macros/inverter/final/gds/inverter_top.gds
    lef:
      - dir::../../macros/inverter/final/lef/inverter_top.lef
    vh:
      - dir::../../macros/inverter/final/vh/inverter_top.v
#   lib:
#     "*":
#       - dir::../../macros/inverter/final/lib/inverter_top.lib
    instances:
      # inverter1 — upper east position (digital outputs to east pads)
      i_chip_core.inverter1:
        location: [expr::(0.48 * 2250), expr::(0.42 * 2024)]   # x = 1080.00, y = 850.08
        orientation: N
      # inverter2 — lower east position (analog channels to east pads)
      i_chip_core.inverter2:
        location: [expr::(0.48 * 2250), expr::(0.42 * 1567)]   # x = 1080.00, y = 658.14
        orientation: N

  # ----------------------------------------------------------------
  # Logos
  # ----------------------------------------------------------------
  sg13g2_ip__jku:
    gds:
      - dir::../../ip/sg13g2_ip__jku/final/gds/sg13g2_ip__jku.gds
    lef:
      - dir::../../ip/sg13g2_ip__jku/final/lef/sg13g2_ip__jku.lef
    vh:
      - dir::../../ip/sg13g2_ip__jku/final/vh/sg13g2_ip__jku.v
    lib:
      "*":
        - dir::../../ip/sg13g2_ip__jku/final/lib/sg13g2_ip__jku.lib
    instances:
      jku_logo:
        location: ["expr::$DIE_AREA[0] + 36.4 + 20.4", "expr::$DIE_AREA[3] - 36.4 - 120.4"]
        orientation: N

  sg13g2_ip__jku_names:
    gds:
      - dir::../../ip/sg13g2_ip__jku_names/final/gds/sg13g2_ip__jku_names.gds
    lef:
      - dir::../../ip/sg13g2_ip__jku_names/final/lef/sg13g2_ip__jku_names.lef
    vh:
      - dir::../../ip/sg13g2_ip__jku_names/final/vh/sg13g2_ip__jku_names.v
    lib:
      "*":
        - dir::../../ip/sg13g2_ip__jku_names/final/lib/sg13g2_ip__jku_names.lib
    instances:
      jku_names:
        location: ["expr::$DIE_AREA[2] - 36.4 - 120.4", "expr::$DIE_AREA[3] - 36.4 - 120.4"]
        orientation: N

MAGIC_GDS_FLATGLOB:
 # For DRC of SRAM macros
 - "lvsres_*"
 - "VIA_M1_*"
 - "VIA_M2_*"
 - "*_CELL_CORNER"
 - "RSC_*"
 - "*_CELL_SUB"